<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Valeria — The Gilded Flagon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12100C;          /* night */
    --wood:#241C14;         /* tavern table */
    --wood-lit:#2E2419;     /* wood near the candle */
    --gold:#D4A017;         /* candle gold */
    --ember:#E07B39;        /* the player's voice */
    --arcane:#9B6BC7;       /* Garcea's magic */
    --parchment:#E9DDC3;    /* the scroll */
    --parchment-ink:#2B2214;
    --muted:#8B7355;        /* faded rope */
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 60% 45% at 50% 0%, rgba(212,160,23,.10), transparent 70%),
      radial-gradient(ellipse 90% 60% at 50% 110%, rgba(224,123,57,.07), transparent 70%),
      var(--ink);
    color:var(--parchment);
    font-family:"Crimson Pro", Georgia, serif;
    font-size:18px;
    line-height:1.6;
    min-height:100vh;
  }

  /* the candle never sits perfectly still */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    background:radial-gradient(ellipse 55% 40% at 50% 8%, rgba(212,160,23,.09), transparent 65%);
    animation:flicker 6s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ opacity:.75; }
    43%    { opacity:1;   }
    47%    { opacity:.62; }
    70%    { opacity:.92; }
  }
  @media (prefers-reduced-motion:reduce){
    body::before{ animation:none; }
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }

  .screen:not(.active){ display:none !important; }

  /* ─────────────────  THE SIGN (menu)  ───────────────── */

  #menu{
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:34px; padding:40px 20px;
  }

  .sign{
    position:relative;
    padding:38px 54px;
    border:2px solid var(--gold);
    border-radius:3px;
    background:linear-gradient(160deg, var(--wood-lit), var(--wood));
    box-shadow:0 0 60px rgba(212,160,23,.13), inset 0 0 40px rgba(0,0,0,.55);
    text-align:center;
    animation:sway 7s ease-in-out infinite;
    transform-origin:top center;
  }
  @keyframes sway{
    0%,100%{ transform:rotate(-.5deg); }
    50%    { transform:rotate(.5deg); }
  }
  /* the chains it hangs from */
  .sign::before, .sign::after{
    content:"";
    position:absolute; top:-40px; width:1px; height:40px;
    background:linear-gradient(var(--muted), var(--gold));
  }
  .sign::before{ left:22%; }
  .sign::after { right:22%; }

  .sign h1{
    font-family:"Cinzel", serif;
    font-weight:700;
    font-size:clamp(30px, 7vw, 52px);
    letter-spacing:.16em;
    margin:0;
    color:var(--gold);
    text-shadow:0 0 24px rgba(212,160,23,.35);
  }
  .sign .sub{
    font-family:"Cinzel", serif;
    font-size:13px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--muted); margin-top:12px;
  }

  .tagline{
    max-width:440px; text-align:center;
    color:#b9a888; font-style:italic; margin:0;
  }

  .choices{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }

  /* ─────────────────  BUTTONS  ───────────────── */

  .btn{
    font-family:"Cinzel", serif;
    font-size:15px; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
    padding:14px 28px;
    color:var(--gold);
    background:linear-gradient(180deg, rgba(212,160,23,.13), rgba(212,160,23,.04));
    border:1px solid var(--gold);
    border-radius:2px;
    cursor:pointer;
    transition:background .25s, box-shadow .25s, transform .15s, color .25s;
  }
  .btn:hover{
    background:var(--gold);
    color:var(--ink);
    box-shadow:0 0 26px rgba(212,160,23,.4);
    transform:translateY(-2px);
  }
  .btn:active{ transform:translateY(0); }
  .btn:focus-visible{ outline:2px solid var(--ember); outline-offset:3px; }
  .btn.ghost{
    color:var(--muted); border-color:rgba(139,115,85,.5); background:transparent;
    font-size:12px; padding:9px 16px; letter-spacing:.1em;
  }
  .btn.ghost:hover{ color:var(--parchment); border-color:var(--muted); background:rgba(139,115,85,.12); box-shadow:none; }

  /* ─────────────────  THE TABLE (chat)  ───────────────── */

  #game{
    max-width:820px; margin:0 auto; padding:22px 20px 28px;
    min-height:100vh; display:flex; flex-direction:column;
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:14px; flex-wrap:wrap;
    padding-bottom:14px; margin-bottom:16px;
    border-bottom:1px solid rgba(212,160,23,.22);
  }
  .brand{
    font-family:"Cinzel", serif; font-weight:700;
    letter-spacing:.18em; color:var(--gold); font-size:17px;
  }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; }

  #log{
    flex:1;
    overflow-y:auto;
    padding:6px 4px 20px;
    display:flex; flex-direction:column; gap:20px;
    scrollbar-width:thin; scrollbar-color:var(--muted) transparent;
  }
  #log::-webkit-scrollbar{ width:8px; }
  #log::-webkit-scrollbar-thumb{ background:rgba(139,115,85,.5); border-radius:4px; }

  /* Garcea speaks on parchment */
  .dm{
    position:relative;
    align-self:flex-start;
    max-width:88%;
    background:
      linear-gradient(178deg, #EFE4CC, #E2D4B4);
    color:var(--parchment-ink);
    padding:20px 24px 18px;
    border-radius:2px;
    white-space:pre-wrap;
    box-shadow:0 10px 26px rgba(0,0,0,.5), inset 0 0 60px rgba(160,120,60,.12);
    animation:unfurl .45s ease-out;
  }
  .dm::before{
    content:"Garcea";
    display:block;
    font-family:"Cinzel", serif;
    font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:#8a6a34;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid rgba(138,106,52,.3);
  }
  @keyframes unfurl{
    from{ opacity:0; transform:translateY(8px) scaleY(.97); }
    to  { opacity:1; transform:none; }
  }

  /* the player speaks in ember ink, on the table itself */
  .you{
    align-self:flex-end;
    max-width:80%;
    text-align:right;
    color:var(--ember);
    font-style:italic;
    padding:4px 6px 4px 0;
    border-right:2px solid rgba(224,123,57,.55);
    padding-right:14px;
    animation:unfurl .3s ease-out;
  }

  /* the DM's asides — system notes */
  .aside{
    align-self:center;
    color:var(--muted);
    font-size:14px; font-style:italic;
    letter-spacing:.04em;
  }

  /* thinking */
  .thinking{
    align-self:flex-start;
    display:flex; align-items:center; gap:12px;
    color:var(--arcane); font-style:italic;
  }
  .d20{
    width:26px; height:26px; flex:none;
    animation:roll 1.6s linear infinite;
  }
  @keyframes roll{ to{ transform:rotate(360deg); } }

  /* ─────────────────  THE INPUT  ───────────────── */

  #bar{
    display:flex; gap:10px; align-items:stretch;
    margin-top:16px;
    padding:6px;
    background:linear-gradient(180deg, var(--wood-lit), var(--wood));
    border:1px solid rgba(212,160,23,.3);
    border-radius:3px;
    box-shadow:inset 0 0 30px rgba(0,0,0,.5);
  }
  #msg{
    flex:1;
    background:transparent;
    border:none;
    color:var(--parchment);
    font-family:"Crimson Pro", Georgia, serif;
    font-size:18px;
    padding:12px 14px;
  }
  #msg::placeholder{ color:rgba(139,115,85,.85); font-style:italic; }
  #msg:focus{ outline:none; }
  #bar:focus-within{ border-color:var(--gold); box-shadow:0 0 24px rgba(212,160,23,.16), inset 0 0 30px rgba(0,0,0,.5); }

  /* ─────────────────  THE RECKONING (the tab)  ───────────────── */

  .reckoning{
    margin-top:14px;
    display:flex; align-items:center; gap:22px; flex-wrap:wrap;
    padding:11px 16px;
    background:rgba(36,28,20,.7);
    border:1px solid rgba(139,115,85,.35);
    border-radius:2px;
    font-family:"IBM Plex Mono", ui-monospace, monospace;
    font-size:12px;
    color:var(--muted);
  }
  .reckoning .label{
    font-family:"Cinzel", serif;
    letter-spacing:.22em; text-transform:uppercase;
    color:rgba(139,115,85,.9);
    font-size:10px;
  }
  .reckoning .stat b{
    color:var(--parchment); font-weight:600; margin-left:6px;
  }
  .reckoning .coin b{ color:var(--gold); }
  .reckoning .spacer{ flex:1; }

  @media (max-width:560px){
    body{ font-size:17px; }
    .dm, .you{ max-width:100%; }
    .reckoning{ gap:14px; font-size:11px; }
  }
</style>
</head>
<body>

<!-- ══════════  MENU  ══════════ -->
<section id="menu" class="screen active">
  <div class="sign">
    <h1>VALERIA</h1>
    <div class="sub">The Gilded Flagon</div>
  </div>

  <p class="tagline">Rain on the cobbles of Thornhold. Inside, the hearth is high and someone is buying. Pull up a chair.</p>

  <div class="choices">
    <button class="btn" onclick="startNew()">Begin a new tale</button>
    <button class="btn" onclick="continueTale()">Return to your tale</button>
  </div>
</section>

<!-- ══════════  GAME  ══════════ -->
<section id="game" class="screen">
  <div class="topbar">
    <div class="brand">VALERIA</div>
    <div class="toolbar">
      <button class="btn ghost" onclick="document.getElementById('file').click()">Bring a scroll</button>
      <input type="file" id="file" accept=".txt,.md" hidden onchange="uploadFile(this)" />
      <button class="btn ghost" onclick="startNew()">New tale</button>
      <button class="btn ghost" onclick="continueTale()">Load tale</button>
      <button class="btn ghost" onclick="goMenu()">The door</button>
    </div>
  </div>

  <div id="log"></div>

  <div id="bar">
    <input id="msg" autocomplete="off" placeholder="What do you do?" />
    <button class="btn" onclick="send()">Speak</button>
  </div>

  <div class="reckoning">
    <span class="label">The reckoning</span>
    <span class="stat">read<b id="tIn">0</b></span>
    <span class="stat">spoken<b id="tOut">0</b></span>
    <span class="spacer"></span>
    <span class="stat coin">◈<b id="tCost">$0.000000</b></span>
  </div>
</section>

<script>
/* ─────────── screens ─────────── */

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
function goMenu(){ show("menu"); }

/* ─────────── writing to the log ─────────── */

const log = () => document.getElementById("log");

function scroll(){ log().scrollTop = log().scrollHeight; }

function addLine(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = text;          // textContent, never innerHTML — user text stays text
  log().appendChild(div);
  scroll();
  return div;
}

function addThinking(){
  const div = document.createElement("div");
  div.className = "thinking";
  div.innerHTML = `
    <svg class="d20" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round">
      <path d="M50 5 L92 30 L92 72 L50 95 L8 72 L8 30 Z"/>
      <path d="M50 5 L50 33 M8 30 L50 33 L92 30 M50 33 L26 78 M50 33 L74 78 M8 72 L26 78 L50 95 L74 78 L92 72 M26 78 L74 78"/>
    </svg>
    <span>Garcea consults the fates\u2026</span>`;
  log().appendChild(div);
  scroll();
  return div;
}

/* ─────────── the reckoning ─────────── */

function setStats(d){
  if (!d) return;
  document.getElementById("tIn").textContent   = d.input_tokens ?? 0;
  document.getElementById("tOut").textContent  = d.output_tokens ?? 0;
  document.getElementById("tCost").textContent = "$" + (d.cost ?? 0).toFixed(6);
}

async function refreshStats(){
  try { setStats(await (await fetch("/stats")).json()); } catch (e) { /* the tab can wait */ }
}

/* ─────────── talking to Garcea ─────────── */

let busy = false;

function setBusy(state){
  busy = state;
  document.getElementById("msg").disabled = state;
  if (!state) document.getElementById("msg").focus();
}

async function ask(text, {echo = true} = {}){
  if (busy) return;
  if (echo) addLine("you", text);
  setBusy(true);
  const spinner = addThinking();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    spinner.remove();

    if (!res.ok) {
      addLine("aside", data.error || "The message did not reach the table.");
    } else {
      addLine("dm", data.reply);
      setStats(data);
    }
  } catch (e) {
    spinner.remove();
    addLine("aside", "The road to the tavern is blocked \u2014 the server is not answering.");
  } finally {
    setBusy(false);
  }
}

function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = "";
  ask(text);
}

/* ─────────── new / continue ─────────── */

const OPENING = "A new player sits at your table. Greet them and start the adventure.";
const RECAP   = "The player has returned. Welcome them back and briefly recap where the story left off.";

async function startNew(){
  if (busy) return;
  show("game");
  log().innerHTML = "";
  try {
    await fetch("/new", { method: "POST" });
  } catch (e) {
    addLine("aside", "The tavern door will not open \u2014 the server is not answering.");
    return;
  }
  await refreshStats();                    // counters were reset to zero
  addLine("aside", "A new tale begins.");
  ask(OPENING, { echo: false });           // Garcea opens; the player said nothing yet
}

async function continueTale(){
  if (busy) return;
  show("game");
  log().innerHTML = "";
  let status = "";
  try {
    status = (await (await fetch("/load", { method: "POST" })).json()).status;
  } catch (e) {
    addLine("aside", "The tavern door will not open \u2014 the server is not answering.");
    return;
  }

  if (status === "no save found") {
    addLine("aside", "No tale of yours is written here. A blank page, then.");
    ask(OPENING, { echo: false });
    return;
  }

  await refreshStats();                    // the loaded session brings its own tab
  addLine("aside", "Your tale is taken down from the shelf.");
  ask(RECAP, { echo: false });
}

/* ─────────── documents ─────────── */

async function uploadFile(input){
  const file = input.files[0];
  if (!file || busy) return;
  input.value = "";                      // so the same file can be picked again

  addLine("aside", `You unroll “${file.name}” on the table…`);
  setBusy(true);

  const form = new FormData();
  form.append("file", file);

  try {
    const res  = await fetch("/upload", { method: "POST", body: form });
    const data = await res.json();

    if (!res.ok) {
      addLine("aside", data.error || "The scroll could not be read.");
      setBusy(false);
      return;
    }

    addLine("aside", `Garcea studies it — ${data.chunks} passage${data.chunks === 1 ? "" : "s"} committed to memory.`);
    setBusy(false);
    ask(`A document titled "${data.document}" has just been added to your knowledge. Acknowledge it briefly, in character, and say you can now answer questions about it.`, { echo: false });
  } catch (e) {
    addLine("aside", "The scroll never reached the table — the server is not answering.");
    setBusy(false); 
  }
}

/* ─────────── keys ─────────── */

document.getElementById("msg").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
